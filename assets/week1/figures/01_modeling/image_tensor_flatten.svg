<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="360" fill="#F8FAFC"/>
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">一张图片在计算机里是什么？</text>
  <text x="42" y="78" font-family="Arial, sans-serif" font-size="15" fill="#4B5563">CIFAR-10: 3 个颜色通道，每个通道 32 × 32 个像素</text>

  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
  </defs>

  <g transform="translate(72 118)">
    <rect x="84" y="44" width="132" height="132" rx="10" fill="#2563EB" opacity="0.85"/>
    <rect x="84" y="44" width="132" height="132" rx="10" fill="url(#grid)" opacity="0.85"/>
    <rect x="42" y="22" width="132" height="132" rx="10" fill="#16A34A" opacity="0.85"/>
    <rect x="42" y="22" width="132" height="132" rx="10" fill="url(#grid)" opacity="0.85"/>
    <rect x="0" y="0" width="132" height="132" rx="10" fill="#DC2626" opacity="0.85"/>
    <rect x="0" y="0" width="132" height="132" rx="10" fill="url(#grid)" opacity="0.85"/>
    <text x="10" y="160" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">R 通道</text>
    <text x="52" y="182" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">G 通道</text>
    <text x="96" y="204" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">B 通道</text>
    <text x="18" y="-16" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">3 × 32 × 32</text>
  </g>

  <line x1="340" y1="190" x2="468" y2="190" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="368" y="172" font-family="Arial, sans-serif" font-size="15" fill="#475569">展平 flatten</text>

  <g transform="translate(512 132)">
    <rect x="0" y="0" width="372" height="116" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <g transform="translate(24 37)">
      <rect x="0" y="0" width="20" height="42" rx="5" fill="#DC2626" opacity="0.88"/>
      <rect x="28" y="0" width="20" height="42" rx="5" fill="#DC2626" opacity="0.65"/>
      <rect x="56" y="0" width="20" height="42" rx="5" fill="#DC2626" opacity="0.42"/>
      <text x="88" y="27" font-family="Arial, sans-serif" font-size="22" fill="#64748B">...</text>
      <rect x="132" y="0" width="20" height="42" rx="5" fill="#16A34A" opacity="0.88"/>
      <rect x="160" y="0" width="20" height="42" rx="5" fill="#16A34A" opacity="0.6"/>
      <text x="192" y="27" font-family="Arial, sans-serif" font-size="22" fill="#64748B">...</text>
      <rect x="236" y="0" width="20" height="42" rx="5" fill="#2563EB" opacity="0.88"/>
      <rect x="264" y="0" width="20" height="42" rx="5" fill="#2563EB" opacity="0.6"/>
      <rect x="292" y="0" width="20" height="42" rx="5" fill="#2563EB" opacity="0.4"/>
    </g>
    <text x="26" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">输入向量 x</text>
    <text x="26" y="100" font-family="Arial, sans-serif" font-size="16" fill="#475569">长度 = 3 × 32 × 32 = 3072</text>
  </g>

  <g transform="translate(70 298)">
    <rect x="0" y="-24" width="820" height="42" rx="10" fill="#EEF2FF"/>
    <text x="18" y="3" font-family="Arial, sans-serif" font-size="16" fill="#3730A3">重点：计算机看到的不是“猫”这个概念，而是 3072 个像素数字组成的向量。</text>
  </g>
</svg>
